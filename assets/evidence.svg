<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Workload-dependent AniSOAP profiling evidence</title>
  <desc id="desc">A static comparison between committed per-system measurements and local operation microbenchmarks.</desc>
  <style>
    .bg { fill: #0b1220; }
    .panel { fill: #121c2d; stroke: #304158; stroke-width: 2; }
    .title { fill: #f8fafc; font: 700 25px system-ui, -apple-system, sans-serif; }
    .heading { fill: #e5edf7; font: 700 18px system-ui, -apple-system, sans-serif; }
    .label { fill: #b9c6d8; font: 600 13px system-ui, -apple-system, sans-serif; }
    .copy { fill: #91a4bc; font: 500 13px system-ui, -apple-system, sans-serif; }
    .value { fill: #dce7f4; font: 700 12px system-ui, -apple-system, sans-serif; }
    .tag-a { fill: #38bdf8; font: 700 11px system-ui, -apple-system, sans-serif; letter-spacing: 0.8px; }
    .tag-b { fill: #a78bfa; font: 700 11px system-ui, -apple-system, sans-serif; letter-spacing: 0.8px; }
    .track { fill: #26364b; }
    .accent-a { fill: #38bdf8; }
    .accent-b { fill: #fbbf24; }
    .accent-c { fill: #a78bfa; }
  </style>

  <rect class="bg" width="1200" height="430" rx="28" />
  <text x="54" y="50" class="title">The stored evidence changes with execution scope</text>
  <text x="54" y="77" class="copy">Whole-workload measurements and tiny-operation timings should not be collapsed into one claim.</text>

  <rect x="52" y="108" width="518" height="270" rx="22" class="panel" />
  <text x="80" y="143" class="heading">Per-system measurements</text>
  <text x="80" y="167" class="tag-a">NUMPY TIME / PYTORCH TIME</text>

  <g transform="translate(80 194)">
    <text x="0" y="13" class="label">1 species</text>
    <rect x="112" y="1" width="276" height="12" rx="6" class="track" />
    <rect x="112" y="1" width="276" height="12" rx="6" class="accent-a" />
    <text x="454" y="13" text-anchor="end" class="value">3.60×</text>

    <text x="0" y="48" class="label">Benzenes</text>
    <rect x="112" y="36" width="276" height="12" rx="6" class="track" />
    <rect x="112" y="36" width="142" height="12" rx="6" class="accent-a" />
    <text x="454" y="48" text-anchor="end" class="value">1.85×</text>

    <text x="0" y="83" class="label">3 species</text>
    <rect x="112" y="71" width="276" height="12" rx="6" class="track" />
    <rect x="112" y="71" width="165" height="12" rx="6" class="accent-a" />
    <text x="454" y="83" text-anchor="end" class="value">2.15×</text>

    <text x="0" y="118" class="label">4 species</text>
    <rect x="112" y="106" width="276" height="12" rx="6" class="track" />
    <rect x="112" y="106" width="87" height="12" rx="6" class="accent-a" />
    <text x="454" y="118" text-anchor="end" class="value">1.13×</text>

    <text x="0" y="153" class="label">Ellipsoids</text>
    <rect x="112" y="141" width="276" height="12" rx="6" class="track" />
    <rect x="112" y="141" width="74" height="12" rx="6" class="accent-b" />
    <text x="454" y="153" text-anchor="end" class="value">0.97×</text>
  </g>

  <rect x="630" y="108" width="518" height="270" rx="22" class="panel" />
  <text x="658" y="143" class="heading">Local tiny-operation tests</text>
  <text x="658" y="167" class="tag-b">PYTORCH TIME / NUMPY TIME</text>

  <g transform="translate(658 194)">
    <text x="0" y="13" class="label">1 species</text>
    <rect x="112" y="1" width="276" height="12" rx="6" class="track" />
    <rect x="112" y="1" width="125" height="12" rx="6" class="accent-c" />
    <text x="454" y="13" text-anchor="end" class="value">6.38×</text>

    <text x="0" y="48" class="label">Benzenes</text>
    <rect x="112" y="36" width="276" height="12" rx="6" class="track" />
    <rect x="112" y="36" width="154" height="12" rx="6" class="accent-c" />
    <text x="454" y="48" text-anchor="end" class="value">7.91×</text>

    <text x="0" y="83" class="label">3 species</text>
    <rect x="112" y="71" width="276" height="12" rx="6" class="track" />
    <rect x="112" y="71" width="86" height="12" rx="6" class="accent-c" />
    <text x="454" y="83" text-anchor="end" class="value">4.42×</text>

    <text x="0" y="118" class="label">4 species</text>
    <rect x="112" y="106" width="276" height="12" rx="6" class="track" />
    <rect x="112" y="106" width="122" height="12" rx="6" class="accent-c" />
    <text x="454" y="118" text-anchor="end" class="value">6.25×</text>

    <text x="0" y="153" class="label">Ellipsoids</text>
    <rect x="112" y="141" width="276" height="12" rx="6" class="track" />
    <rect x="112" y="141" width="276" height="12" rx="6" class="accent-c" />
    <text x="454" y="153" text-anchor="end" class="value">14.14×</text>
  </g>

  <text x="600" y="407" text-anchor="middle" class="copy">The ratios point in opposite directions because the measurements cover different execution scopes.</text>
</svg>
